<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โนมิโน่ 4 ผู้เล่น · x ชน x / s ชน n · ปุ่มประจำตัว</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e4b3e 0%, #136b4f 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: #efe8d3;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            padding: 24px;
            border: 8px solid #b8824e;
        }
        h1 {
            text-align: center;
            margin: 0 0 8px 0;
            color: #2f1f0f;
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 2px 2px 0 #e9d6b0;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: #4a3723;
            margin-bottom: 24px;
            font-style: italic;
        }
        .status-bar {
            background: #cfb28b;
            border-radius: 60px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.4rem;
            border: 4px solid #8f6b3e;
            margin-bottom: 24px;
            color: #2c1f12;
        }
        .turn-indicator {
            background: #ecb96e;
            padding: 10px 30px;
            border-radius: 40px;
            border: 3px solid #7b4f24;
            box-shadow: inset 0 -3px 0 #5e3d1b;
        }
        .game-over-badge {
            background: #b53b3b;
            color: white;
            padding: 10px 30px;
            border-radius: 40px;
            border: 3px solid #731c1c;
        }
        .board-area {
            background: #6f8c6f;
            border-radius: 60px;
            padding: 30px 20px;
            margin-bottom: 30px;
            border: 8px solid #4a5e4a;
            box-shadow: inset 0 -6px 0 #2f402f;
        }
        .board-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fef7d6;
            text-align: center;
            margin-bottom: 16px;
            text-shadow: 2px 2px 0 #405540;
        }
        .board-tiles {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 100px;
        }
        .tile {
            display: inline-flex;
            background: #fffcf0;
            border: 3px solid #3d2b14;
            border-radius: 18px;
            font-size: 2rem;
            font-weight: bold;
            width: 100px;
            height: 60px;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            box-shadow: 0 8px 0 #5a3e22, 0 10px 12px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            color: #1f1a12;
        }
        .tile.selected {
            transform: translateY(-6px);
            box-shadow: 0 10px 0 #3d5a9b, 0 15px 20px rgba(0,0,0,0.4);
            border-color: #1e47b5;
        }
        .tile.covered {
            background: #5a5f6b;
            border-color: #2f3540;
            box-shadow: 0 8px 0 #2d2f35;
            color: #c0c7d4;
            font-size: 2.2rem;
            justify-content: center;
            gap: 8px;
        }
        .tile.covered .left, .tile.covered .right {
            border-right: none;
            color: #dddddd;
        }
        .tile .left, .tile .right {
            flex: 1;
            text-align: center;
        }
        .tile .left {
            border-right: 3px solid #b0926c;
        }

        /* มือผู้เล่นทั้งสี่คน */
        .hands-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .hand-card {
            border-radius: 40px;
            padding: 16px 12px 20px 12px;
            border: 5px solid #5f4a2e;
            background: #eadbbd;
            box-shadow: 0 10px 0 #836e4a, inset 0 2px 10px #fff2d4;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }
        .hand-card.current-turn {
            border: 8px solid #f5c542;
            box-shadow: 0 0 0 4px #ffd966, 0 12px 0 #b47d2e;
            transform: scale(1.02);
        }
        .hand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 0 8px 12px 8px;
            border-bottom: 3px dashed #a58357;
            margin-bottom: 16px;
        }
        .player-name {
            background: #2b2217;
            color: white;
            padding: 8px 28px;
            border-radius: 50px;
            font-size: 1.4rem;
            letter-spacing: 1px;
            border: 3px solid #efd39e;
        }
        .hand-tiles {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            min-height: 90px;
            margin-bottom: 16px;
        }
        /* ปุ่มควบคุมภายในมือ */
        .hand-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }
        .hand-controls button {
            background: #5f4a32;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #3e2e1d;
            transition: 0.05s linear;
            border: 1px solid #cfa668;
            flex: 1 0 auto;
            min-width: 70px;
        }
        .hand-controls button:hover:not(:disabled) {
            background: #7d5e3f;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #3e2e1d;
        }
        .hand-controls button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3e2e1d;
        }
        .hand-controls button:disabled {
            background: #a7a08a;
            box-shadow: 0 2px 0 #67604d;
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* สีพื้นหลังเฉพาะแต่ละผู้เล่น */
        .player-0 .hand-card { background: #fbc3c3; }  /* แดงอ่อน */
        .player-1 .hand-card { background: #b3d9ff; }  /* ฟ้าอ่อน */
        .player-2 .hand-card { background: #c3e6cb; }  /* เขียวอ่อน */
        .player-3 .hand-card { background: #fff2b5; }  /* เหลืองอ่อน */

        .player-0.current-turn .hand-card { border-color: #d32f2f; }
        .player-1.current-turn .hand-card { border-color: #1976d2; }
        .player-2.current-turn .hand-card { border-color: #388e3c; }
        .player-3.current-turn .hand-card { border-color: #fbc02d; }

        .global-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0 20px;
        }
        .global-controls button {
            background: #6b4f32;
            border: none;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 16px 32px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #3e2e1d;
            border: 2px solid #cfa668;
        }
        .global-controls button:hover {
            background: #7d5e3f;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #3e2e1d;
        }
        .reset-btn {
            background: #c9a23b;
            box-shadow: 0 8px 0 #8b6216;
            border-color: #f5d742;
        }
        .info-message {
            background: #cfc09f;
            border-radius: 60px;
            padding: 18px 30px;
            font-size: 1.3rem;
            text-align: center;
            border: 4px solid #907b56;
            font-weight: 500;
            margin-top: 20px;
        }
        .flip-badge {
            background: #3a5c8c;
            color: white;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
        }
        .stock-info {
            font-size: 1.2rem;
            background: #4d3a25;
            color: #f0dbb4;
            padding: 6px 18px;
            border-radius: 40px;
            border: 2px solid #c9a86b;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🎯 โนมิโน่ 4 ผู้เล่น</h1>
    <div class="subtitle">⚡ x ชน x · s ชน n · แต่ละคนมีปุ่มของตัวเอง ⚡</div>

    <div class="status-bar" id="statusBar">
        <span class="turn-indicator" id="turnDisplay">ตาผู้เล่น 1</span>
        <span class="stock-info" id="stockCount">เหลือ 36</span>
        <span class="game-over-badge" id="gameOverDisplay" style="display: none;">ผู้ชนะ</span>
    </div>

    <!-- กระดานหลัก -->
    <div class="board-area">
        <div class="board-title">⚙️ สายกระดาน ⚙️</div>
        <div class="board-tiles" id="board"></div>
    </div>

    <!-- มือผู้เล่นทั้ง 4 คน แสดงในกริด 2x2 -->
    <div class="hands-grid" id="handsContainer"></div>

    <!-- ปุ่มรีเซ็ตเกม (กลาง) -->
    <div class="global-controls">
        <button id="resetBtn" class="reset-btn">🔄 เริ่มเกมใหม่</button>
    </div>

    <div class="info-message" id="messageArea">
        👆 คลิกที่ไทล์ในมือเพื่อเลือก แล้วกดปุ่มในกรอบนั้น
    </div>
</div>

<script>
(function() {
    // --------------------------------------------------------------
    // กำหนดค่าคงที่
    const SYMBOLS = ['x', 's', 'n'];
    const PLAYER_COUNT = 4;
    const INIT_HAND_SIZE = 7;          // แจกคนละ 7 ใบ
    const TILES_PER_PATTERN = 6;        // แต่ละแบบมี 6 ชิ้น -> 6 แบบ *6 = 36 ใบ

    // ตรวจสอบว่าสองด้านชนกันได้หรือไม่ (x-x, s-n, n-s)
    function canMatch(a, b) {
        return (a === 'x' && b === 'x') ||
               (a === 's' && b === 'n') ||
               (a === 'n' && b === 's');
    }

    // สร้างกองไทล์เริ่มต้น 36 ใบ
    function createStock() {
        let tiles = [];
        // ไทล์คู่เหมือน
        SYMBOLS.forEach(sym => {
            for (let i = 0; i < TILES_PER_PATTERN; i++) {
                tiles.push({ left: sym, right: sym });
            }
        });
        // ไทล์คู่ต่าง
        const pairs = [['x','s'], ['x','n'], ['s','n']];
        pairs.forEach(([a, b]) => {
            for (let i = 0; i < TILES_PER_PATTERN; i++) {
                tiles.push({ left: a, right: b });
            }
        });
        // สับเปลี่ยน
        for (let i = tiles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
        }
        return tiles;
    }

    // สถานะเกม
    let stock = [];
    let hands = [[], [], [], []];
    let board = [];
    let currentPlayer = 0;            // 0..3
    let passCount = 0;                // จำนวนผู้เล่นที่ผ่านติดต่อกัน (เมื่อครบ 4 จบเกม)
    let gameOver = false;
    let winner = null;                // 0,1,2,3 หรือ 'tie'

    // UI state
    let selectedTileIndex = -1;        // index ในมือ currentPlayer
    let flipped = false;               // สถานะหมุนสำหรับไทล์ที่เลือก

    // --------------------------------------------------------------
    // ฟังก์ชันช่วยเหลือ
    function isValidPlacement(tile, board, position, flipped) {
        if (board.length === 0) return true; // ไทล์แรกวางได้เสมอ
        const leftSym = flipped ? tile.right : tile.left;
        const rightSym = flipped ? tile.left : tile.right;
        if (position === 'head') {
            return canMatch(rightSym, board[0].left);
        } else {
            return canMatch(leftSym, board[board.length-1].right);
        }
    }

    // ตรวจสอบว่าผู้เล่นที่กำหนดมีไทล์ที่เล่นได้อย่างน้อยหนึ่งใบหรือไม่
    function hasAnyValidMove(player) {
        return hands[player].some(tile => {
            return isValidPlacement(tile, board, 'head', false) ||
                   isValidPlacement(tile, board, 'tail', false) ||
                   isValidPlacement(tile, board, 'head', true) ||
                   isValidPlacement(tile, board, 'tail', true);
        });
    }

    // จั่วไทล์จากกองให้ผู้เล่น (ถ้ามี)
    function drawTile(player) {
        if (stock.length === 0) return false;
        const tile = stock.pop();
        hands[player].push(tile);
        return true;
    }

    // หาผู้ชนะเมื่อเกมจบเพราะ passCount ครบ 4 (วัดจากจำนวนไทล์เหลือ น้อยที่สุดชนะ)
    function determineWinnerFromHands() {
        let minCount = Math.min(...hands.map(h => h.length));
        let candidates = hands.reduce((acc, h, idx) => h.length === minCount ? [...acc, idx] : acc, []);
        if (candidates.length === 1) {
            winner = candidates[0];
        } else {
            winner = 'tie';
        }
    }

    // เริ่มเทิร์นสำหรับผู้เล่นปัจจุบัน (ตอนนี้ไม่มี auto draw)
    function startTurn() {
        if (gameOver) return;
        updateUI();
    }

    // วางไทล์
    function placeTile(player, tileIndex, position, flipped) {
        if (gameOver) return false;
        if (player !== currentPlayer) {
            alert('ไม่ใช่ตาของคุณ');
            return false;
        }
        if (tileIndex < 0 || tileIndex >= hands[player].length) return false;

        const tile = hands[player][tileIndex];
        if (!isValidPlacement(tile, board, position, flipped)) {
            alert('ไม่สามารถวางไทล์ในตำแหน่งนี้ได้');
            return false;
        }

        // สร้างไทล์ที่จะวาง (หมุนถ้าต้องการ)
        const placedTile = flipped ? { left: tile.right, right: tile.left } : { left: tile.left, right: tile.right };

        // เอาไทล์ออกจากมือ
        hands[player].splice(tileIndex, 1);

        // วางบนกระดาน
        if (position === 'head') {
            board.unshift(placedTile);
        } else {
            board.push(placedTile);
        }

        // รีเซ็ตการเลือก
        selectedTileIndex = -1;
        flipped = false;

        // ตรวจสอบว่าผู้เล่นนี้หมดมือหรือยัง
        if (hands[player].length === 0) {
            gameOver = true;
            winner = player;
            updateUI();
            return true;
        }

        // ยังไม่จบ: สลับผู้เล่น, รีเซ็ต passCount
        passCount = 0;
        currentPlayer = (currentPlayer + 1) % PLAYER_COUNT;
        startTurn();
        return true;
    }

    // ผู้เล่นขอจั่ว (ไม่เปลี่ยน turn)
    function handleDraw(player) {
        if (gameOver) return;
        if (player !== currentPlayer) {
            alert('ไม่ใช่ตาของคุณ');
            return;
        }
        if (stock.length === 0) {
            alert('กองไทล์หมดแล้ว');
            return;
        }
        drawTile(player);
        // ไม่เปลี่ยน currentPlayer, ไม่เปลี่ยน passCount
        // รีเซ็ต selected? ควรคงเดิมหรือล้าง? เราจะคงเดิม (ยังเลือกไทล์เดิมอยู่)
        updateUI();
    }

    // ผู้เล่นขอผ่าน (เปลี่ยน turn)
    function handlePass(player) {
        if (gameOver) return;
        if (player !== currentPlayer) {
            alert('ไม่ใช่ตาของคุณ');
            return;
        }
        // ตรวจสอบว่ามีตัววางหรือไม่? ถ้ามีตัววางควรไม่ให้ผ่าน? 
        // เราจะอนุญาตให้ผ่านได้เสมอ แต่ถ้าผ่านทั้งที่มีตัววางจะเสียเปรียบ
        // เพื่อความถูกต้อง เราจะเตือนและให้ผ่านได้ แต่จะไม่เพิ่ม passCount? 
        // ตามกติกาจริงควรผ่านได้เมื่อไม่มีตัววางเท่านั้น
        // ดังนั้นเราจะปิดปุ่มผ่านเมื่อมีตัววาง แต่ถ้ามาถึงตรงนี้ได้เพราะปุ่ม disable แล้ว 
        // แต่เผื่อเรียกตรงเราจะตรวจสอบอีกที
        if (hasAnyValidMove(player)) {
            alert('คุณยังมีไทล์ที่สามารถวางได้ กรุณาวางหรือหมุนก่อน');
            return;
        }

        // เปลี่ยนผู้เล่น
        currentPlayer = (currentPlayer + 1) % PLAYER_COUNT;
        passCount++;
        if (passCount >= PLAYER_COUNT) {
            gameOver = true;
            determineWinnerFromHands();
        }
        selectedTileIndex = -1;
        flipped = false;
        updateUI();
    }

    // --------------------------------------------------------------
    // ส่วนต่อประสานกับผู้ใช้ (UI)
    function renderBoard() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        if (board.length === 0) {
            boardDiv.innerHTML = '<div style="color: #e9e1c7; font-size: 1.8rem;">⟵ ยังไม่มีไทล์ วางไทล์แรกได้เลย ⟶</div>';
        } else {
            board.forEach(tile => {
                const tileEl = document.createElement('div');
                tileEl.className = 'tile';
                tileEl.innerHTML = `<span class="left">${tile.left}</span><span class="right">${tile.right}</span>`;
                boardDiv.appendChild(tileEl);
            });
        }
    }

    function renderHands() {
        const container = document.getElementById('handsContainer');
        container.innerHTML = '';

        for (let p = 0; p < PLAYER_COUNT; p++) {
            const playerDiv = document.createElement('div');
            playerDiv.className = `player-${p}`;
            const isCurrent = (p === currentPlayer && !gameOver);

            const card = document.createElement('div');
            card.className = `hand-card ${isCurrent ? 'current-turn' : ''}`;

            // หัวข้อมือ
            const header = document.createElement('div');
            header.className = 'hand-header';
            const nameBg = p === 0 ? '#b71c1c' : p === 1 ? '#0d47a1' : p === 2 ? '#1b5e20' : '#b26a00';
            header.innerHTML = `<span class="player-name" style="background: ${nameBg};">👤 ผู้เล่น ${p+1}</span>
                                <span class="flip-badge" style="opacity: ${(isCurrent && selectedTileIndex !== -1 && flipped) ? '1' : '0'};">🔁 หมุน</span>`;
            card.appendChild(header);

            // ไทล์ในมือ
            const tilesDiv = document.createElement('div');
            tilesDiv.className = 'hand-tiles';

            // กำหนดว่าให้แสดงไทล์จริง หรือ cover
            const showReal = (p === currentPlayer && !gameOver) || gameOver;

            if (showReal) {
                hands[p].forEach((tile, idx) => {
                    const tileEl = document.createElement('div');
                    tileEl.className = `tile ${(isCurrent && idx === selectedTileIndex) ? 'selected' : ''}`;
                    // ใส่ data เฉพาะเมื่อเป็นตาปัจจุบันและยังไม่จบเกม (เพื่อให้คลิกเลือกได้)
                    if (isCurrent && !gameOver) {
                        tileEl.dataset.index = idx;
                        tileEl.dataset.player = p;
                    }
                    tileEl.innerHTML = `<span class="left">${tile.left}</span><span class="right">${tile.right}</span>`;
                    tilesDiv.appendChild(tileEl);
                });
            } else {
                for (let i = 0; i < hands[p].length; i++) {
                    const tileEl = document.createElement('div');
                    tileEl.className = 'tile covered';
                    tileEl.innerHTML = '<span class="left">❓</span><span class="right">❓</span>';
                    tilesDiv.appendChild(tileEl);
                }
            }
            card.appendChild(tilesDiv);

            // ปุ่มควบคุมเฉพาะผู้เล่นนี้ (จะแสดงเฉพาะเมื่อเป็นตาปัจจุบันและเกมไม่จบ)
            if (isCurrent && !gameOver) {
                const controlsDiv = document.createElement('div');
                controlsDiv.className = 'hand-controls';

                // ปุ่มหมุน
                const rotateBtn = document.createElement('button');
                rotateBtn.textContent = '🔄 หมุน';
                rotateBtn.disabled = (selectedTileIndex === -1);
                rotateBtn.onclick = () => {
                    if (selectedTileIndex === -1) {
                        alert('กรุณาเลือกไทล์ก่อน');
                        return;
                    }
                    flipped = !flipped;
                    updateUI();
                };

                // ปุ่มวางหัว
                const headBtn = document.createElement('button');
                headBtn.textContent = '⬅️ วางหัว';
                headBtn.disabled = (selectedTileIndex === -1) || 
                    !isValidPlacement(hands[p][selectedTileIndex], board, 'head', flipped);
                headBtn.onclick = () => {
                    if (selectedTileIndex === -1) return;
                    placeTile(p, selectedTileIndex, 'head', flipped);
                };

                // ปุ่มวางท้าย
                const tailBtn = document.createElement('button');
                tailBtn.textContent = 'วางท้าย ➡️';
                tailBtn.disabled = (selectedTileIndex === -1) || 
                    !isValidPlacement(hands[p][selectedTileIndex], board, 'tail', flipped);
                tailBtn.onclick = () => {
                    if (selectedTileIndex === -1) return;
                    placeTile(p, selectedTileIndex, 'tail', flipped);
                };

                // ปุ่มจั่ว
                const drawBtn = document.createElement('button');
                drawBtn.textContent = '🎲 จั่ว';
                drawBtn.disabled = (stock.length === 0);
                drawBtn.onclick = () => handleDraw(p);

                // ปุ่มผ่าน (จะ enable เมื่อไม่มีตัววาง)
                const passBtn = document.createElement('button');
                passBtn.textContent = '⏭️ ผ่าน';
                passBtn.disabled = hasAnyValidMove(p);  // ผ่านได้เมื่อไม่มีตัววาง
                passBtn.onclick = () => handlePass(p);

                controlsDiv.appendChild(rotateBtn);
                controlsDiv.appendChild(headBtn);
                controlsDiv.appendChild(tailBtn);
                controlsDiv.appendChild(drawBtn);
                controlsDiv.appendChild(passBtn);

                card.appendChild(controlsDiv);
            }

            playerDiv.appendChild(card);
            container.appendChild(playerDiv);
        }
    }

    function updateUI() {
        renderBoard();
        renderHands();

        // อัปเดตจำนวนกอง
        document.getElementById('stockCount').innerText = `เหลือ ${stock.length}`;

        // แสดงสถานะ
        const turnSpan = document.getElementById('turnDisplay');
        const gameOverSpan = document.getElementById('gameOverDisplay');
        if (!gameOver) {
            turnSpan.innerText = `🎲 ตาผู้เล่น ${currentPlayer + 1}`;
            gameOverSpan.style.display = 'none';
        } else {
            turnSpan.innerText = `🏁 เกมจบ`;
            let winText = '';
            if (winner === 0 || winner === 1 || winner === 2 || winner === 3) {
                winText = `🥇 ผู้เล่น ${winner+1} ชนะ!`;
            } else {
                winText = '🤝 เสมอ';
            }
            gameOverSpan.style.display = 'inline-block';
            gameOverSpan.innerText = winText;
        }

        // ข้อความแนะนำ
        const msg = document.getElementById('messageArea');
        if (gameOver) {
            msg.innerText = 'เกมจบแล้ว กดปุ่ม "เริ่มเกมใหม่" เพื่อเล่นอีกครั้ง';
        } else if (board.length === 0) {
            msg.innerText = '🪧 วางไทล์แรกได้เลย (เลือกไทล์ในมือ แล้วกดวางหัว/ท้าย)';
        } else if (selectedTileIndex === -1) {
            msg.innerText = '👆 คลิกที่ไทล์ในมือเพื่อเลือก แล้วกดปุ่มในกรอบ';
        } else {
            const tile = hands[currentPlayer][selectedTileIndex];
            if (tile) {
                const canHead = isValidPlacement(tile, board, 'head', flipped);
                const canTail = isValidPlacement(tile, board, 'tail', flipped);
                if (canHead || canTail) {
                    msg.innerText = `✅ วางได้: ${canHead ? 'หัว' : ''} ${canTail ? 'ท้าย' : ''}  กดปุ่ม`;
                } else {
                    msg.innerText = '❌ ไทล์นี้วางไม่ได้ ลองหมุนหรือเลือกใหม่';
                }
            }
        }
    }

    // --------------------------------------------------------------
    // Event handler สำหรับคลิกเลือกไทล์ (ใช้ delegation)
    function handleTileClick(e) {
        if (gameOver) return;
        const tile = e.target.closest('.tile');
        if (!tile) return;
        if (!tile.dataset.index) return; // เป็น cover

        const player = parseInt(tile.dataset.player, 10);
        const idx = parseInt(tile.dataset.index, 10);

        if (player !== currentPlayer) {
            alert('ตอนนี้ไม่ใช่ตาของคุณ');
            return;
        }

        if (selectedTileIndex === idx) {
            selectedTileIndex = -1;
            flipped = false;
        } else {
            selectedTileIndex = idx;
            flipped = false;
        }
        updateUI();
    }

    function resetGame() {
        stock = createStock();
        hands = [[], [], [], []];
        for (let i = 0; i < INIT_HAND_SIZE; i++) {
            for (let p = 0; p < PLAYER_COUNT; p++) {
                if (stock.length) hands[p].push(stock.pop());
            }
        }
        board = [];
        currentPlayer = 0;
        passCount = 0;
        gameOver = false;
        winner = null;
        selectedTileIndex = -1;
        flipped = false;
        updateUI();
    }

    // --------------------------------------------------------------
    // ผูก Events
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('handsContainer');
        container.addEventListener('click', handleTileClick);

        document.getElementById('resetBtn').addEventListener('click', resetGame);

        resetGame();
    });
})();
</script>
</body>
</html>
